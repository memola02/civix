<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US27 - Confirmar Resolución | Civix</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="ciudadano.css">
  <link rel="stylesheet" href="confirmar_resolucion.css">
</head>
<body>

  <section class="tarjeta-confirmacion-resolucion">
    <div class="cabecera-confirmacion">
      <h2 class="titulo-confirmacion">Verificación de Resolución</h2>
      <p class="texto-confirmacion">La municipalidad ha marcado este reporte como <strong>Solucionado</strong>. ¿Confirmas que la incidencia ha sido atendida correctamente?</p>
    </div>
    
    <form class="acciones-confirmacion" action="#" method="POST">
      <input type="hidden" name="id_incidencia" value="INC-2024-002">
      
      <button type="submit" class="boton-primario confirmar">
        Sí, confirmar resolución
      </button>
      
      <button type="button" class="boton-secundario rechazar">
        No, el problema persiste
      </button>
    </form>
  </section>

</body>
</html>
