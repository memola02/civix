<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US23 - Detalle del Reporte | Civix</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="ciudadano.css">
  <link rel="stylesheet" href="estado_reporte.css">
</head>
<body>

  <main class="contenedor-detalle-reporte">
    <header class="cabecera-estado">
      <h1 class="titulo-reporte">Detalle del Reporte</h1>
      <div class="indicador-estado en-proceso">
        <span class="etiqueta-estado">En proceso</span>
      </div>
      <p class="fecha-actualizacion">Última actualización: 14/06/2026</p>
    </header>

    <section class="informacion-reporte">
      <article class="tarjeta-detalle">
        <h2 class="subtitulo-detalle">Datos del hecho</h2>
        <div class="grupo-dato">
          <span class="etiqueta-dato">Categoría:</span>
          <p class="valor-dato">Infraestructura Pública</p>
        </div>
        <div class="grupo-dato">
          <span class="etiqueta-dato">Descripción:</span>
          <p class="valor-dato">Bache profundo en la vía principal que dificulta el tránsito vehicular.</p>
        </div>
      </article>

      <article class="tarjeta-detalle">
        <h2 class="subtitulo-detalle">Ubicación y Evidencia</h2>
        <div class="mapa-contenedor">
          <div class="mapa-placeholder">Mapa: Av. Principal 123</div>
        </div>
        <div class="galeria-evidencia">
          <img src="tu-imagen-de-prueba.jpg" alt="Evidencia fotográfica" class="imagen-evidencia">
        </div>
      </article>
    </section>
  </main>

</body>
</html>
