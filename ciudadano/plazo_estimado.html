<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US26 - Plazo Estimado | Civix</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="ciudadano.css">
  <link rel="stylesheet" href="plazo_estimado.css">
</head>
<body>

  <section class="tarjeta-plazo-estimado" aria-label="Plazo estimado de atención">
    <div class="icono-plazo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0F5FA8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
    </div>
    
    <div class="contenido-plazo">
      <h2 class="titulo-plazo">Tiempo estimado de resolución</h2>
      <p class="valor-plazo">7 a 10 días hábiles</p>
      
      <div class="alerta-actualizacion">
        <span class="etiqueta-actualizacion">Actualizado</span>
        <p class="texto-actualizacion">El plazo se recalculó tras la derivación al Área de Mantenimiento Vial.</p>
      </div>
    </div>
  </section>

</body>
</html>
